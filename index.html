<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jest Studio | Технический перерыв</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Общие стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0033 0%, #0b0b0e 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Контейнер */
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 20, 25, 0.6);
            padding: 50px 30px;
            border-radius: 20px;
            border: 1px solid rgba(157, 78, 221, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Логотип и иконка */
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .logo span {
            color: #9d4edd;
        }

        .gear-icon {
            font-size: 50px;
            color: #ff9e00;
            margin-bottom: 25px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff9e00, #9d4edd);
            -webkit-background-clip: text;
            background-clip: text; /* Исправлено предупреждение vendorPrefix */
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a0a0a5;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Таймер */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 45px;
        }

        .countdown-item {
            background: #141419;
            border: 1px solid #1f1f27;
            padding: 15px;
            border-radius: 12px;
            min-width: 90px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .countdown-time {
            display: block;
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff9e00;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Кнопка Телеграм */
        .btn-telegram {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #0088cc;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 136, 204, 0.4);
        }

        .btn-telegram:hover {
            background: #0077b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.6);
        }

        .btn-telegram i {
            font-size: 1.3rem;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .countdown { gap: 10px; }
            .countdown-item { min-width: 70px; padding: 10px; }
            .countdown-time { font-size: 1.6rem; }
            .countdown-label { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">JEST <span>STUDIO</span></div>
        <div class="gear-icon"><i class="fas fa-cog"></i></div>
        <h1>Технический перерыв</h1>
        <p>Мы обновляем платформу, добавляем новые квесты и загружаем эксклюзивный мерч. Наш сайт откроется уже совсем скоро!</p>

        <!-- Таймер обратного отсчета -->
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-time" id="days">00</span>
                <span class="countdown-label">Дней</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="hours">00</span>
                <span class="countdown-label">Часов</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="minutes">00</span>
                <span class="countdown-label">Минут</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-time" id="seconds">00</span>
                <span class="countdown-label">Секунд</span>
            </div>
        </div>

        <!-- Ссылка на Telegram -->
        <a href="https://t.me/JestvorStudio" target="_blank" class="btn-telegram">
            <i class="fab fa-telegram-plane"></i> Новости запуска в Telegram
        </a>
    </div>

    <script>
        // Установка точной даты открытия на 5 Июня 2026 года
        const launchDate = new Date("June 5, 2026 00:00:00").getTime();

        const countdownFunction = setInterval(() => {
            const now = new Date().getTime();
            const distance = launchDate - now;

            // Расчет единиц времени
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Красивый вывод с нулями
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // Когда время выйдет
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.querySelector(".container").innerHTML = `
                    <div class="logo">JEST <span>STUDIO</span></div>
                    <h1>Мы открылись!</h1>
                    <p>Добро пожаловать на основную платформу Jest Studio. Перезагрузите страницу для входа!</p>
                    <a href="https://t.me/JestvorStudio" target="_blank" class="btn-telegram">
                        <i class="fab fa-telegram-plane"></i> Наш Telegram
                    </a>
                `;
            }
        }, 1000);
    </script>

</body>
</html>
